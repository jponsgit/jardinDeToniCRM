var _pendingAction = null;

function sincronizarReservasCalCom() {
    // ⚠️ PON AQUÍ LA URL DE TU SEGUNDO ESCENARIO (El que tiene el Webhook Response)
    var API_URL = 'https://hook.eu1.make.com/89jgvfsxejtqodiaxbnuwag1fuq74axd';

    fetch(API_URL)
    .then(response => {
        if (!response.ok) throw new Error('Error de red');
        return response.text();
    })
    .then(texto => {
        if (!texto || texto.trim() === "" || texto.trim() === "[]") {
            console.log("Cal.com: No hay reservas nuevas en el Data Store.");
            return;
        }

        var nuevasReservas = JSON.parse(texto);
        var cambios = false;

        if (!Array.isArray(nuevasReservas)) return;

        nuevasReservas.forEach(booking => {
            var idReservaCalCom = booking.uid || booking.key;
            if (!idReservaCalCom || idReservaCalCom === "undefined") return;

            // Evitar duplicar si ya existe en la pantalla
            var yaExisteSvc = S.svc.some(function(s) { return s.id === idReservaCalCom; });
            if (yaExisteSvc) return;

            var emailBuscado = booking.email ? booking.email.toLowerCase().trim() : '';
            var cliente = S.cli.find(function(c) {
                return c.email && c.email.toLowerCase().trim() === emailBuscado;
            });

            // Si el cliente no existe, lo creamos con sus datos REALES sacados del Data Store
            if (!cliente) {
                var nuevoClienteId = 'c_cal_' + Date.now() + Math.random().toString(36).substr(2, 3);
                cliente = {
                    id: nuevoClienteId,
                    nombre: booking.nombre && booking.nombre !== "undefined" ? booking.nombre : 'Cliente Cal.com',
                    tipo: 'particular',
                    zona: S.zonas && S.zonas.length ? S.zonas[0] : 'Ciutadella',
                    direccion: 'Dirección por confirmar',
                    telefono: booking.telefono && booking.telefono !== "undefined" ? booking.telefono : '',
                    email: emailBuscado,
                    notas: 'Creado desde Cal.com. ' + (booking.notas || '')
                };
                S.cli.push(cliente);
                cambios = true;
            }

            // Procesar la fecha y hora
            var fechaLimpia = '';
            var horaLimpia = '10:00';
            if (booking.fecha_hora) {
                var formatoEstandar = booking.fecha_hora.replace(' ', 'T');
                var d = new Date(formatoEstandar);
                if (!isNaN(d.getTime())) {
                    fechaLimpia = d.toISOString().substring(0, 10);
                    horaLimpia = d.toTimeString().substring(0, 5);
                }
            }
            if (!fechaLimpia) fechaLimpia = new Date().toISOString().substring(0, 10);

            // Crear el servicio
            var nuevoServicio = {
                id: idReservaCalCom,
                clienteId: cliente.id,
                tipoServicio: S.tipos && S.tipos.length ? S.tipos[0].id : 't1',
                operario: 'Toni',
                fecha: fechaLimpia,
                hora: horaLimpia,
                duracion: (booking.duracion || '45') + 'min',
                observaciones: 'Cita automática Cal.com: ' + (booking.notas || 'Sin descripción'),
                estado: 'programado'
            };

            S.svc.push(nuevoServicio);
            cambios = true;
        });

        if (cambios) {
            save();
            render();
            if (typeof toast === 'function') toast('¡Reservas sincronizadas!');
        }
    })
    .catch(error => console.error('Error en la sincronización pasiva:', error));
}


function openModal(title, msg, action) {
    _pendingAction = action;
    document.getElementById('mt').textContent = title;
    document.getElementById('mm').innerHTML = msg;
    document.getElementById('modal-bg').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal-bg').style.display = 'none';
    _pendingAction = null;
}

function doConfirm() {
    var action = _pendingAction;
    document.getElementById('modal-bg').style.display = 'none';
    _pendingAction = null;
    if (action) {
        setTimeout(action, 10);
    }
}

function toast(msg, type) {
    type = type || 'ok';
    var bg = type === 'err' ? '#B91C1C' : '#3a6b35';
    var ic = type === 'err' ? 'fa-exclamation-circle' : 'fa-check-circle';
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:200;padding:14px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;background:' + bg;
    t.innerHTML = '<i class="fa-solid ' + ic + '"></i> ' + esc(msg);
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 3000);
}

function delCliente(id) {
    var c = gCI(id); if (!c) return;
    openModal('Eliminar cliente', '¿Eliminar a <strong>' + esc(c.nombre) + '</strong> y todos sus servicios?', function () {
        S.svc = S.svc.filter(function (s) { return s.clienteId !== id; });
        S.cli = S.cli.filter(function (x) { return x.id !== id; });
        save(); toast('Cliente eliminado'); nav('clientes');
    });
}

function delServicio(id) {
    var s = S.svc.find(function (x) { return x.id === id; }); if (!s) return;
    var c = gCI(s.clienteId); var t = gTS(s.tipoServicio);
    openModal('Eliminar servicio', '¿Eliminar <strong>' + esc(t.nombre) + '</strong> del <strong>' + fDate(s.fecha) + '</strong>?', function () {
        S.svc = S.svc.filter(function (x) { return x.id !== id; });
        save(); toast('Servicio eliminado'); render();
    });
}

function delTipo(id) {
    var t = S.tipos.find(function (x) { return x.id === id; }); if (!t) return;
    var u = S.svc.filter(function (s) { return s.tipoServicio === id; }).length;
    var msg = '¿Eliminar <strong>' + esc(t.nombre) + '</strong>?';
    if (u > 0) msg += '<br><br><span style="color:#b45309">Tiene ' + u + ' servicio' + (u > 1 ? 's' : '') + ' asociado' + (u > 1 ? 's' : '') + ' que también se eliminarán.</span>';
    openModal('Eliminar tipo', msg, function () {
        S.svc = S.svc.filter(function (s) { return s.tipoServicio !== id; });
        S.tipos = S.tipos.filter(function (x) { return x.id !== id; });
        save(); toast('Tipo eliminado'); render();
    });
}

// ============================================================
// PERSISTENCIA (LOCALSTORAGE)
// ============================================================
var KEY = 'toni_crm_v3';

function save() { 
    try {
        localStorage.setItem(KEY, JSON.stringify({ cli: S.cli, svc: S.svc, tipos: S.tipos })); 
    } catch(e) {
        console.error("Error guardando en localStorage", e);
    }
}

function load() {
    try {
        var r = localStorage.getItem(KEY);
        if (r) {
            var d = JSON.parse(r);
            S.cli = Array.isArray(d.cli) ? d.cli : [];
            S.svc = Array.isArray(d.svc) ? d.svc : [];
            S.tipos = Array.isArray(d.tipos) ? d.tipos : [];
            return true;
        }
    } catch(e) {
        console.error("Error cargando localStorage", e);
    }
    return false;
}

    S.tipos = defTipos();

        { id: 'c4', nombre: 'Joan Pons Mascaró', tipo: 'particular', zona: 'Cala en Blanes', telefono: '629 876 543', email: 'joan@email.com', direccion: 'C/ Ponderosa 12', frecuencia: 'mensual', fechaAlta: '2023-09-05', notas: '' },
        { id: 'c5', nombre: 'Comunidad Los Pinos', tipo: 'comunidad', zona: 'Sa Caleta', telefono: '971 150 230', email: 'pres@lospinos.es', direccion: 'Urb. Los Pinos 8', frecuencia: 'quincenal', fechaAlta: '2023-11-18', notas: '16 viviendas.' },

function gid() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5); }
function fDate(d) { if (!d) return '-'; return new Date(d + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }); }
function fShort(d) { if (!d) return '-'; return new Date(d + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }); }
function fRel(d) { var h = new Date(); h.setHours(0, 0, 0, 0); var f = new Date(d + 'T00:00:00'); f.setHours(0, 0, 0, 0); var df = Math.round((f - h) / 864e5); if (df === 0) return 'Hoy'; if (df === 1) return 'Mañana'; if (df === -1) return 'Ayer'; if (df > 1 && df <= 7) return 'En ' + df + ' días'; if (df < -1 && df >= -7) return 'Hace ' + Math.abs(df) + ' días'; return fDate(d); }
function gTC(t) { return TCLI.find(function (x) { return x.v === t; }) || TCLI[0]; }
function gTS(t) { return S.tipos.find(function (x) { return x.id === t; }) || { id: t, nombre: 'Desconocido', icono: 'fa-circle', duracion: '-' }; }
function gTE(e) { return EST.find(function (x) { return x.v === e; }) || EST[0]; }

function rReservar() {
    var o = '<div class="p-5 lg:p-8">';
    o += '<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6"><div><h1 class="text-2xl font-extrabold text-forest-900">Reservar Cita</h1><p class="text-sm text-gray-500 mt-1">Las reservas hechas aquí se registran automáticamente en el CRM</p></div>';
    o += '<button onclick="window.open(\'https://cal.com/joan-pons\',\'_blank\')" class="btn btn-secondary btn-sm"><i class="fa-solid fa-external-link-alt"></i> Abrir externo</button></div>';
    o += '<div class="card p-4 overflow-hidden" style="min-height: 800px; background: #fff;">';
    // Contenedor donde Cal.com inyectará el iframe
    o += '<div id="cal-embed-container" style="width:100%;height:100%;min-height:780px;"></div>';
    o += '</div></div>';
    
    // Es NECESARIO usar setTimeout para darle tiempo al DOM a insertar el div antes de llamar a Cal()
    setTimeout(function() {
        var container = document.getElementById("cal-embed-container");
        if (container && typeof Cal !== 'undefined') {
            container.innerHTML = ''; // Limpiar por si acaso
            try {
                Cal("inline", {
                    elementOrSelector: "#cal-embed-container",
                    calLink: "joan-pons"
                });
                // Configuración de estilos de Cal.com
                Cal("ui", {
                    "theme": "light",
                    "styles": {
                        "branding": {
                            "brandColor": "#3a6b35" // Color de tu CRM
                        }
                    }
                });
            } catch(e) {
                console.error("Error incrustando Cal.com:", e);
                container.innerHTML = '<div class="p-8 text-center text-gray-500">Error al cargar el calendario. Intenta usar el botón de abrir externo.</div>';
            }
        }
    }, 300); // 300ms de espera
    
    return o;
}

// Función que captura cuando Cal.com confirma una reserva
function handleCalBooking(event) {
    try {
        console.log("Evento de Cal.com detectado:", event.detail);
        
        var detail = event.detail;
        if (!detail) return;

        // Cal.com envía la información en detail.payload o detail.data
        var booking = detail.payload || detail.data;
        if (!booking) return;

        // Extraer fecha (startTime viene en formato ISO)
        var startTime = booking.startTime || booking.start;
        var dateStr = new Date(startTime).toISOString().split('T')[0];

        // Extraer respuestas del formulario de Cal.com
        var responses = booking.responses || {};
        var name = responses.name || (booking.title ? booking.title.split(' and ')[0] : 'Cliente Cal.com');
        var email = responses.email || '';
        var phone = responses.phone || '';

        // Buscar cliente existente por email para no duplicar
        var client = null;
        if (email) {
            client = S.cli.find(function (c) { return c.email && c.email.toLowerCase() === email.toLowerCase(); });
        }
        
        var clientId;

        if (client) {
            clientId = client.id;
        } else {
            // Crear nuevo cliente si no existe
            clientId = gid();
            S.cli.push({
                id: clientId,
                nombre: name,
                tipo: 'particular',
                zona: '',
                telefono: phone,
                email: email,
                direccion: '',
                frecuencia: 'puntual',
                fechaAlta: new Date().toISOString().split('T')[0],
                notas: 'Creado automáticamente desde Cal.com'
            });
        }

        // Intentar asociar el tipo de servicio según el título del evento en Cal.com
        var tipoId = S.tipos.length > 0 ? S.tipos[0].id : '';
        if (booking.eventType && booking.eventType.title) {
            var matchedTipo = S.tipos.find(function (t) { 
                return t.nombre.toLowerCase().includes(booking.eventType.title.toLowerCase()); 
            });
            if (matchedTipo) tipoId = matchedTipo.id;
        }

        // Crear el servicio en el CRM
        S.svc.push({
            id: gid(),
            fecha: dateStr,
            clienteId: clientId,
            tipoServicio: tipoId,
            operario: 'Toni',
            duracion: '60min',
            observaciones: 'Reserva automática Cal.com',
            estado: 'programado'
        });

        save();
        toast('¡Reserva de Cal.com sincronizada con el CRM!');
        
    } catch (e) {
        console.error("Error procesando reserva de Cal.com:", e);
    }
}

function init() { 
    var loaded = load();
    if (!loaded) {
        sample();
    }
    if (!S.tipos || !S.tipos.length) S.tipos = defTipos();
    S.view = 'dashboard'; 
    updNav(); 
    render(); 

    // Escuchador del evento de Cal.com (window es más fiable que document para CustomEvents)
    window.addEventListener("cal:bookingSuccessful", handleCalBooking);

    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { closeModal(); if (S.sbOpen) toggleSB(); } }); 
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
