        sb.from('clientes').select('*'),

        tipos: t.data ? t.data.map(tipoFromRow) : [],
        svc: s.data ? s.data.map(svcFromRow) : []
    };
}

async function dbSaveCliente(obj) {

        if (obj.id) {

            var { data, error } = await sb.from('clientes').insert(cliToRow(obj)).select().single();

}

    var o = '<div class="p-5 lg:p-8"><button onclick="nav(\'tipos\')" class="text-sm text-gray-500 hover:text-forest-600 font-medium mb-4 cursor-pointer"><i class="fa-solid fa-arrow-left mr-1"></i> Volver</button><h1 class="text-2xl font-extrabold text-forest-900 mb-6">' + (edit ? 'Editar tipo' : 'Nuevo tipo') + '</h1><form onsubmit="saveTipo(event,' + edit + ')" class="card p-5 lg:p-6 max-w-3xl"><div class="grid sm:grid-cols-2 gap-4">';
    o += fi('Nombre *', 'text', 'nombre', t.nombre, 'Nombre del servicio', 1);
    o += '<div><label class="form-label">Icono</label><select name="icono" class="form-input">'; ICONS.forEach(function (ic) { o += '<option value="' + ic + '"' + (t.icono === ic ? ' selected' : '') + '>' + ic + '</option>'; }); o += '</select></div>';
    o += '<div><label class="form-label">Duración</label><select name="duracion" class="form-input">'; ['30min','45min','60min','90min','120min'].forEach(function (d) { o += '<option value="' + d + '"' + (t.duracion === d ? ' selected' : '') + '>' + d + '</option>'; }); o += '</select></div>';
    o += '</div><div class="flex gap-3 mt-6 pt-4 border-t border-[#F0EBE2]"><button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> ' + (edit ? 'Guardar' : 'Crear') + '</button><button type="button" class="btn btn-secondary" onclick="nav(\'tipos\')">Cancelar</button></div></form></div>'; return o; }

async function saveTipo(ev, edit) {
    ev.preventDefault(); var f = ev.target;
    var d = { nombre: f.nombre.value.trim(), icono: f.icono.value, duracion: f.duracion.value };
    if (!d.nombre) { toast('Introduce un nombre', 'err'); return; }
    if (edit && S.editTipoId) {
        var i = S.tipos.findIndex(function (t) { return t.id === S.editTipoId; });
        if (i !== -1) S.tipos[i] = Object.assign({}, S.tipos[i], d);
        await dbSaveTipo(S.tipos[i]);
        save(); toast('Tipo actualizado'); S.editTipoId = null; nav('tipos');
    } else {
        var nuevoTipo = await dbSaveTipo(d);
        S.tipos.push(nuevoTipo);
        save(); toast('Tipo creado'); S.editTipoId = null; nav('tipos');
    }
}

    var px = S.svc.filter(function (s) { return s.estado === 'programado' && new Date(s.fecha + 'T00:00:00') >= h; }).sort(function (a, b) { return a.fecha.localeCompare(b.fecha); });
    var o = '<div class="p-5 lg:p-8"><div class="mb-6"><h1 class="text-2xl font-extrabold text-forest-900">Próximas visitas</h1><p class="text-sm text-gray-500">' + px.length + ' programadas</p></div>';
    if (!px.length) o += '<div class="card p-12 text-center text-gray-400">No hay visitas programadas</div>';
    else { o += '<div class="flex flex-col gap-3">'; px.forEach(function (s) { var c = gCI(s.clienteId); var t = gTS(s.tipoServicio); var e = gTE(s.estado); 
        var actionBtns = '<div class="flex gap-1">';
        if (s.estado === 'programado') actionBtns += '<button onclick="event.stopPropagation();compSvc(\'' + s.id + '\')" class="bact" title="Completar servicio"><i class="fa-solid fa-check"></i></button>';
        actionBtns += '<button onclick="event.stopPropagation();delServicio(\'' + s.id + '\')" class="bdel" title="Eliminar"><i class="fa-solid fa-trash"></i></button></div>';

        o += '<div class="card p-4 cursor-pointer hover:border-forest-500/30 transition-colors" onclick="nav(\'ficha\',{cliId:\'' + s.clienteId + '\'})"><div class="flex items-center justify-between mb-2"><span class="text-sm font-bold text-forest-900">' + fRel(s.fecha) + ' <span class="font-normal text-gray-500">(' + fDate(s.fecha) + ')</span></span><div class="flex items-center gap-2"><span class="badge" style="background:' + e.b + ';color:' + e.c + '">' + e.l + '</span>' + actionBtns + '</div></div><div class="flex items-center gap-2 mb-1"><i class="fa-solid ' + t.icono + ' text-gray-400 text-xs"></i><span class="text-sm">' + esc(t.nombre) + '</span></div><div class="flex gap-3 text-xs text-gray-500"><span><i class="fa-solid fa-user mr-1"></i>' + (c ? esc(c.nombre) : '—') + '</span><span><i class="fa-solid fa-wrench mr-1"></i>' + s.operario + '</span><span><i class="fa-solid fa-clock mr-1"></i>' + (s.duracion || '-') + '</span></div></div>'; }); o += '</div>'; } o += '</div>'; return o;

function rReservar() {
    var o = '<div class="p-5 lg:p-8"><button onclick="nav(\'dashboard\')" class="text-sm text-gray-500 hover:text-forest-600 font-medium mb-4 cursor-pointer"><i class="fa-solid fa-arrow-left mr-1"></i> Volver</button><h1 class="text-2xl font-extrabold text-forest-900 mb-2">Reservar cita</h1><p class="text-sm text-gray-500 mb-6">Selecciona un horario disponible y se sincronizará automáticamente con el CRM.</p>';
    o += '<div class="card overflow-hidden" style="min-height:500px"><div id="calcom-embed" style="width:100%;height:600px"></div></div></div>';

}
